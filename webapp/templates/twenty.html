{% extends "base.html" %}
{% block title %}20 Questions{% endblock %}

{% block extra_styles %}
<style>
  .tq-wrap {
    max-width: 600px;
    margin: 2rem auto;
  }
  .tq-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 2rem;
    text-align: center;
  }
  .tq-title {
    color: var(--yellow);
    font-size: 18px;
    letter-spacing: 0.15em;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .tq-sub {
    color: var(--dim);
    font-size: 12px;
    margin-bottom: 1.5rem;
    line-height: 1.7;
  }
  .tq-question {
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }
  .tq-counter {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }
  .tq-counter span { color: var(--yellow); }
  .tq-btn-row {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .tq-btn {
    background: transparent;
    border: 1px solid var(--yellow);
    color: var(--yellow);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 18px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .tq-btn:hover { background: rgba(217,119,6,0.1); }
  .tq-btn.green { border-color: var(--green); color: var(--green); }
  .tq-btn.green:hover { background: rgba(22,163,74,0.1); }
  .tq-btn.red { border-color: var(--red); color: var(--red); }
  .tq-btn.red:hover { background: rgba(220,38,38,0.1); }
  .tq-btn.dim { border-color: var(--dim); color: var(--dim); }
  .tq-btn.dim:hover { border-color: var(--text); color: var(--text); }
  .tq-guess-box {
    border: 1px solid var(--yellow);
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    text-align: left;
  }
  .tq-guess-label { color: var(--dim); font-size: 11px; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
  .tq-guess-text { color: var(--yellow); font-size: 16px; font-weight: 700; }
  .tq-guess-reason { color: var(--dim); font-size: 11px; margin-top: 0.6rem; line-height: 1.6; }
  .tq-reveal-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    width: 100%;
    max-width: 300px;
    outline: none;
    margin-bottom: 0.8rem;
  }
  .tq-reveal-input:focus { border-color: var(--yellow); }
  .tq-history {
    margin-top: 1.5rem;
    text-align: left;
  }
  .tq-history-title {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.3rem;
  }
  .tq-history-row {
    display: flex;
    gap: 0.5rem;
    padding: 3px 0;
    border-bottom: 1px solid var(--bg3);
    font-size: 12px;
  }
  .tq-history-num { color: var(--dim); min-width: 22px; }
  .tq-history-q { flex: 1; color: var(--text); }
  .tq-history-a { font-weight: 600; }
  .tq-history-a.yes { color: var(--green); }
  .tq-history-a.no  { color: var(--red); }
  .tq-history-a.other { color: var(--yellow); }
  .tq-result-msg { font-size: 16px; font-weight: 700; margin-bottom: 0.8rem; }
  .tq-result-msg.won { color: var(--green); }
  .tq-result-msg.lost { color: var(--red); }
  .tq-thinking { color: var(--dim); font-size: 12px; }
  #tq-spinner { display: none; }
</style>
{% endblock %}

{% block content %}
<div class="tq-wrap">
  <div class="tq-panel" id="tq-panel">
    <!-- rendered by JS -->
  </div>
</div>
{% endblock %}

{% block footer %}20 Questions — AI guessing game{% endblock %}

{% block extra_scripts %}
<script>
let state = { status: "idle", history: [], question: null, guess: null, reasoning: null, q_num: 0, reveal: "" };

function answerClass(a) {
  const l = a.toLowerCase();
  if (["yes","y","correct","true"].includes(l)) return "yes";
  if (["no","n","nope","false","never"].includes(l)) return "no";
  return "other";
}

function renderHistory(history) {
  if (!history.length) return "";
  const rows = history.map((h, i) => {
    const cls = answerClass(h.answer);
    return `<div class="tq-history-row">
      <span class="tq-history-num">${i+1}.</span>
      <span class="tq-history-q">${h.question}</span>
      <span class="tq-history-a ${cls}">${h.answer}</span>
    </div>`;
  }).join("");
  return `<div class="tq-history"><div class="tq-history-title">History</div>${rows}</div>`;
}

function render() {
  const p = document.getElementById("tq-panel");
  const MAX = 20;

  if (state.status === "idle") {
    p.innerHTML = `
      <div class="tq-title">20 QUESTIONS</div>
      <div class="tq-sub">
        Think of anything — a person, animal, object, place, or idea.<br>
        Keep it secret. I'll ask up to <strong>20 yes/no questions</strong> to figure it out.
      </div>
      <div class="tq-btn-row">
        <button class="tq-btn" onclick="startGame()">START GAME</button>
      </div>`;
    return;
  }

  if (state.status === "asking") {
    const remaining = MAX - state.q_num + 1;
    const barColor = remaining > 10 ? "var(--green)" : remaining > 5 ? "var(--yellow)" : "var(--red)";
    p.innerHTML = `
      <div class="tq-counter">Question <span>${state.q_num}</span> / ${MAX} &nbsp;·&nbsp; ${remaining} remaining</div>
      <div class="tq-question">${state.question}</div>
      <div class="tq-btn-row">
        <button class="tq-btn green" onclick="answer('yes')">YES</button>
        <button class="tq-btn red"   onclick="answer('no')">NO</button>
        <button class="tq-btn"       onclick="answer('sometimes')">SOMETIMES</button>
        <button class="tq-btn"       onclick="answer('kind of')">KIND OF</button>
        <button class="tq-btn dim"   onclick="answer('unknown')">UNKNOWN</button>
      </div>
      <div id="tq-spinner" class="tq-thinking">Thinking…</div>
      ${renderHistory(state.history)}`;
    return;
  }

  if (state.status === "guessed") {
    p.innerHTML = `
      <div class="tq-counter">After ${state.history.length} question${state.history.length !== 1 ? "s" : ""}</div>
      <div class="tq-guess-box">
        <div class="tq-guess-label">MY GUESS</div>
        <div class="tq-guess-text">${state.guess}</div>
        ${state.reasoning ? `<div class="tq-guess-reason">${state.reasoning}</div>` : ""}
      </div>
      <div class="tq-sub">Did I get it right?</div>
      <div class="tq-btn-row">
        <button class="tq-btn green" onclick="confirm(true)">YES, CORRECT!</button>
        <button class="tq-btn red"   onclick="showReveal()">NO, I WIN</button>
      </div>
      <div id="tq-reveal-form" style="display:none; margin-top:1rem;">
        <input id="tq-reveal" class="tq-reveal-input" placeholder="What were you thinking of?" />
        <div class="tq-btn-row">
          <button class="tq-btn dim" onclick="confirm(false)">SUBMIT</button>
        </div>
      </div>
      ${renderHistory(state.history)}`;
    return;
  }

  if (state.status === "won") {
    p.innerHTML = `
      <div class="tq-result-msg won">Got it in ${state.history.length} question${state.history.length !== 1 ? "s" : ""}!</div>
      <div class="tq-btn-row" style="margin-top:1rem;">
        <button class="tq-btn" onclick="resetGame()">PLAY AGAIN</button>
      </div>
      ${renderHistory(state.history)}`;
    return;
  }

  if (state.status === "lost") {
    p.innerHTML = `
      <div class="tq-result-msg lost">You win!</div>
      <div class="tq-sub" style="margin-bottom:1rem;">
        ${state.reveal ? `You were thinking of: <strong style="color:var(--text)">${state.reveal}</strong>` : "Well played!"}
      </div>
      <div class="tq-btn-row">
        <button class="tq-btn" onclick="resetGame()">PLAY AGAIN</button>
      </div>
      ${renderHistory(state.history)}`;
    return;
  }
}

function setLoading(on) {
  const spinner = document.getElementById("tq-spinner");
  if (spinner) spinner.style.display = on ? "block" : "none";
  document.querySelectorAll(".tq-btn").forEach(b => b.disabled = on);
}

async function post(url, body) {
  const r = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: body ? JSON.stringify(body) : undefined,
  });
  return r.json();
}

async function startGame() {
  setLoading(true);
  state = await post("/twenty/start");
  render();
}

async function answer(ans) {
  setLoading(true);
  state = await post("/twenty/answer", { answer: ans });
  render();
}

function showReveal() {
  const f = document.getElementById("tq-reveal-form");
  if (f) f.style.display = "block";
}

async function confirm(correct) {
  const revealEl = document.getElementById("tq-reveal");
  const reveal = revealEl ? revealEl.value.trim() : "";
  state = await post("/twenty/confirm", { correct, reveal });
  render();
}

async function resetGame() {
  await post("/twenty/reset");
  state = { status: "idle", history: [], question: null, guess: null, reasoning: null, q_num: 0, reveal: "" };
  render();
}

render();
</script>
{% endblock %}
