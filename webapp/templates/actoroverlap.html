{% extends "base.html" %}
{% block title %}Actor Overlap{% endblock %}

{% block extra_styles %}
<style>
  .ao-wrap { max-width: 860px; }

  /* ── Search panels ─────────────────────────────────────── */
  .ao-picks {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  @media (max-width: 580px) {
    .ao-picks { grid-template-columns: 1fr; }
  }

  .ao-pick-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .ao-input-wrap { position: relative; }

  .ao-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    padding: 11px 12px;
    outline: none;
    -webkit-appearance: none;
    border-radius: 0;
  }
  .ao-input:focus { border-color: var(--yellow); }

  /* ── Dropdown ──────────────────────────────────────────── */
  .ao-drop {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--bg2);
    border: 1px solid var(--yellow);
    border-top: none;
    z-index: 200;
    max-height: 320px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .ao-opt {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 9px 10px;
    cursor: pointer;
    border-bottom: 1px solid var(--bg3);
    -webkit-tap-highlight-color: transparent;
  }
  .ao-opt:last-child { border-bottom: none; }
  .ao-opt:active { background: var(--bg3); }

  .ao-opt-thumb {
    width: 38px;
    height: 57px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg3);
  }
  .ao-opt-thumb-ph {
    width: 38px;
    height: 57px;
    background: var(--bg3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    font-size: 9px;
    letter-spacing: 0.05em;
  }
  .ao-opt-title { font-size: 13px; font-weight: 700; line-height: 1.3; }
  .ao-opt-meta  { font-size: 11px; color: var(--dim); margin-top: 3px; }
  .ao-opt-type  { color: var(--cyan); text-transform: uppercase; letter-spacing: 0.07em; }

  /* ── Selected card ─────────────────────────────────────── */
  .ao-card {
    display: flex;
    gap: 0.8rem;
    padding: 0.7rem;
    background: var(--bg2);
    border: 1px solid var(--yellow);
    align-items: flex-start;
  }
  .ao-card-poster {
    width: 58px;
    height: 87px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg3);
  }
  .ao-card-poster-ph {
    width: 58px;
    height: 87px;
    background: var(--bg3);
    flex-shrink: 0;
  }
  .ao-card-title { font-size: 13px; font-weight: 700; line-height: 1.3; }
  .ao-card-meta  { font-size: 11px; color: var(--dim); margin-top: 4px; }
  .ao-change-btn {
    display: inline-block;
    margin-top: 8px;
    font-size: 11px;
    color: var(--yellow);
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
    padding: 0;
    letter-spacing: 0.04em;
  }

  /* ── Compare button ────────────────────────────────────── */
  .ao-go {
    width: 100%;
    padding: 13px;
    background: var(--yellow);
    color: #111;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .ao-go:disabled {
    background: var(--border);
    color: var(--dim);
    cursor: not-allowed;
  }

  /* ── Results ───────────────────────────────────────────── */
  .ao-results { margin-top: 1.5rem; }

  .ao-summary {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 0.9rem;
    letter-spacing: 0.04em;
  }
  .ao-summary strong { color: var(--text); }

  .ao-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 0.65rem;
  }
  @media (max-width: 580px) {
    .ao-grid { grid-template-columns: 1fr; }
  }

  .ao-actor {
    display: flex;
    gap: 0.7rem;
    padding: 0.7rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    align-items: flex-start;
  }
  .ao-actor-photo {
    width: 48px;
    height: 72px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg3);
  }
  .ao-actor-photo-ph {
    width: 48px;
    height: 72px;
    background: var(--bg3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    font-size: 20px;
  }
  .ao-actor-name { font-size: 13px; font-weight: 700; }
  .ao-actor-role {
    font-size: 11px;
    color: var(--dim);
    margin-top: 4px;
    line-height: 1.45;
  }
  .ao-actor-role span { color: var(--text); font-style: italic; }

  .ao-none  { color: var(--dim); font-size: 13px; padding: 1.5rem 0; text-align: center; }
  .ao-error { color: var(--red); font-size: 12px; padding: 0.75rem; background: var(--bg2); border: 1px solid var(--red); margin-top: 0.5rem; }
  .ao-spin  { color: var(--dim); font-size: 12px; padding: 1rem 0; letter-spacing: 0.06em; }
</style>
{% endblock %}

{% block content %}
<div class="ao-wrap">
  <div class="rule">ACTOR OVERLAP</div>

  <div class="ao-picks">
    <!-- ── Title A ── -->
    <div>
      <div class="ao-pick-label">First Movie or TV Show</div>
      <div id="search-a">
        <div class="ao-input-wrap">
          <input id="inp-a" class="ao-input" type="search" placeholder="Search title…"
                 autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <div id="drop-a" class="ao-drop" style="display:none"></div>
        </div>
      </div>
      <div id="card-a" style="display:none"></div>
    </div>

    <!-- ── Title B ── -->
    <div>
      <div class="ao-pick-label">Second Movie or TV Show</div>
      <div id="search-b">
        <div class="ao-input-wrap">
          <input id="inp-b" class="ao-input" type="search" placeholder="Search title…"
                 autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <div id="drop-b" class="ao-drop" style="display:none"></div>
        </div>
      </div>
      <div id="card-b" style="display:none"></div>
    </div>
  </div>

  <button id="go-btn" class="ao-go" disabled onclick="doCompare()">Find Overlap</button>

  <div id="results" class="ao-results" style="display:none"></div>
</div>
{% endblock %}

{% block footer %}&#9646; Actor Overlap{% endblock %}

{% block extra_scripts %}
<script>
const IMG   = "https://image.tmdb.org/t/p";
const cache = {a: [], b: []};
let   sel   = {a: null, b: null};

/* ── Utility ─────────────────────────────────────────────── */
function esc(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function posterImg(path, cls, w, h) {
  if (path) return `<img class="${cls}" src="${IMG}/w154${path}" alt="" loading="lazy">`;
  return `<div class="${cls}-ph" style="width:${w}px;height:${h}px;background:var(--bg3)"></div>`;
}

function profileImg(path) {
  if (path) return `<img class="ao-actor-photo" src="${IMG}/w185${path}" alt="" loading="lazy">`;
  return `<div class="ao-actor-photo-ph">&#128100;</div>`;
}

/* ── Search ──────────────────────────────────────────────── */
function wire(side) {
  const inp  = document.getElementById(`inp-${side}`);
  const drop = document.getElementById(`drop-${side}`);
  let timer  = null;

  inp.addEventListener("input", () => {
    clearTimeout(timer);
    const q = inp.value.trim();
    if (!q) { drop.style.display = "none"; return; }
    timer = setTimeout(() => loadSuggestions(side, q), 280);
  });

  inp.addEventListener("blur",  () => setTimeout(() => drop.style.display = "none", 160));
  inp.addEventListener("focus", () => { if (drop.children.length) drop.style.display = "block"; });
}

async function loadSuggestions(side, q) {
  const drop = document.getElementById(`drop-${side}`);
  try {
    const r    = await fetch(`/actoroverlap/search?q=${encodeURIComponent(q)}`);
    const items = await r.json();
    cache[side] = items;
    if (!items.length) { drop.style.display = "none"; return; }
    drop.innerHTML = items.map((it, i) => {
      const thumb = it.poster
        ? `<img class="ao-opt-thumb" src="${IMG}/w92${it.poster}" alt="" loading="lazy">`
        : `<div class="ao-opt-thumb-ph">N/A</div>`;
      const type = it.type === "movie" ? "Movie" : "TV Series";
      return `<div class="ao-opt" ontouchstart="" onclick="pick('${side}',${i})">
        ${thumb}
        <div>
          <div class="ao-opt-title">${esc(it.title)}</div>
          <div class="ao-opt-meta">${esc(it.year) || "—"} &nbsp;<span class="ao-opt-type">${type}</span></div>
        </div>
      </div>`;
    }).join("");
    drop.style.display = "block";
  } catch (_) { /* ignore transient errors */ }
}

/* ── Pick / clear ────────────────────────────────────────── */
function pick(side, idx) {
  const item  = cache[side][idx];
  const drop  = document.getElementById(`drop-${side}`);
  const srch  = document.getElementById(`search-${side}`);
  const card  = document.getElementById(`card-${side}`);
  drop.style.display = "none";
  sel[side]          = item;

  const type = item.type === "movie" ? "Movie" : "TV Series";
  card.innerHTML = `
    <div class="ao-card">
      ${posterImg(item.poster, "ao-card-poster", 58, 87)}
      <div>
        <div class="ao-card-title">${esc(item.title)}</div>
        <div class="ao-card-meta">${esc(item.year) || "—"} · ${type}</div>
        <button class="ao-change-btn" onclick="clear('${side}')">&#10005; change</button>
      </div>
    </div>`;

  srch.style.display = "none";
  card.style.display = "block";
  document.getElementById("results").style.display = "none";
  updateBtn();
}

function clear(side) {
  sel[side] = null;
  document.getElementById(`card-${side}`).style.display  = "none";
  const srch = document.getElementById(`search-${side}`);
  srch.style.display = "block";
  const inp = document.getElementById(`inp-${side}`);
  inp.value = "";
  inp.focus();
  document.getElementById("results").style.display = "none";
  updateBtn();
}

function updateBtn() {
  document.getElementById("go-btn").disabled = !(sel.a && sel.b);
}

/* ── Compare ─────────────────────────────────────────────── */
async function doCompare() {
  const btn = document.getElementById("go-btn");
  const res = document.getElementById("results");
  btn.disabled = true;
  btn.textContent = "Loading…";
  res.style.display = "block";
  res.innerHTML = `<div class="ao-spin">Fetching cast data from TMDB…</div>`;

  const p = new URLSearchParams({
    a_type: sel.a.type, a_id: sel.a.id, a_title: sel.a.title,
    b_type: sel.b.type, b_id: sel.b.id, b_title: sel.b.title,
  });

  try {
    const r    = await fetch(`/actoroverlap/compare?${p}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    render(data);
  } catch (e) {
    res.innerHTML = `<div class="ao-error">Error: ${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Find Overlap";
  }
}

/* ── Render results ──────────────────────────────────────── */
function render(data) {
  const res = document.getElementById("results");
  const { count, actors, title_a, title_b } = data;

  if (!count) {
    res.innerHTML = `<div class="rule">RESULTS</div>
      <div class="ao-none">No credited actors appear in both titles.</div>`;
    return;
  }

  const cards = actors.map(a => {
    const charA = a.char_a ? `<span>${esc(a.char_a)}</span>` : `—`;
    const charB = a.char_b ? `<span>${esc(a.char_b)}</span>` : `—`;
    return `<div class="ao-actor">
      ${profileImg(a.profile)}
      <div class="ao-actor-info">
        <div class="ao-actor-name">${esc(a.name)}</div>
        <div class="ao-actor-role">In <em>${esc(title_a)}</em>: ${charA}</div>
        <div class="ao-actor-role">In <em>${esc(title_b)}</em>: ${charB}</div>
      </div>
    </div>`;
  }).join("");

  res.innerHTML = `
    <div class="rule">RESULTS</div>
    <div class="ao-summary">
      ${count} actor${count === 1 ? "" : "s"} appear in both
      <strong>${esc(title_a)}</strong> and <strong>${esc(title_b)}</strong>
    </div>
    <div class="ao-grid">${cards}</div>`;
}

wire("a");
wire("b");
</script>
{% endblock %}
