<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHaDE</title>
  <style>
    :root {
      --s-color: #6C63FF;
      --d-color: #FF6584;
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --text: #e8e8f0;
      --muted: #888899;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(135deg, var(--s-color), var(--d-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* WHO PAYS NEXT BANNER */
    .next-up {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      margin-bottom: 28px;
      border: 1px solid var(--surface2);
      position: relative;
      overflow: hidden;
    }

    .next-up::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.06;
      background: var(--next-color, var(--s-color));
      pointer-events: none;
    }

    .next-label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .next-name {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--next-color, var(--text));
    }

    .next-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .next-up.balanced .next-name {
      font-size: 1.6rem;
    }

    /* AVATARS */
    .avatars {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .avatar-card {
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .avatar-card.s { border-color: var(--s-color)22; }
    .avatar-card.d { border-color: var(--d-color)22; }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 900;
      margin: 0 auto 8px;
    }

    .s .avatar { background: var(--s-color)33; color: var(--s-color); }
    .d .avatar { background: var(--d-color)33; color: var(--d-color); }

    .avatar-name {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .avatar-count {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ADD FORM */
    .add-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 28px;
      border: 1px solid var(--surface2);
    }

    .section-title {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input[type="date"], input[type="text"] {
      background: var(--surface2);
      border: 1px solid #333344;
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus { border-color: var(--s-color); }

    input[type="date"] { flex: 0 0 145px; }

    .payer-btns {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .payer-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid transparent;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--surface2);
      color: var(--muted);
      transition: all 0.15s;
    }

    .payer-btn.s-btn { border-color: var(--s-color)44; }
    .payer-btn.d-btn { border-color: var(--d-color)44; }
    .payer-btn.s-btn.active { background: var(--s-color)22; color: var(--s-color); border-color: var(--s-color); }
    .payer-btn.d-btn.active { background: var(--d-color)22; color: var(--d-color); border-color: var(--d-color); }

    .add-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--s-color), var(--d-color));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .add-btn:hover { opacity: 0.9; }
    .add-btn:disabled { opacity: 0.35; cursor: default; }

    /* HISTORY */
    .history-section { }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .clear-btn {
      font-size: 0.75rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }

    .clear-btn:hover { color: var(--d-color); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .outing-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .outing-item {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-left: 3px solid var(--item-color);
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .outing-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
      flex-shrink: 0;
      background: var(--item-color)22;
      color: var(--item-color);
    }

    .outing-info { flex: 1; min-width: 0; }

    .outing-note {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .outing-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .outing-payer {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--item-color);
      white-space: nowrap;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--d-color); }

    /* CONFETTI OVERLAY */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 40px;
      padding: 10px 22px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 380px) {
      .form-row { flex-direction: column; }
      input[type="date"] { flex: unset; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">SHaDE</div>
  <div class="tagline">Stephen &amp; Doug &mdash; who's buying?</div>
</header>

<div class="next-up" id="nextUp">
  <div class="next-label">Next round is on</div>
  <div class="next-name" id="nextName">—</div>
  <div class="next-sub" id="nextSub">No outings recorded yet</div>
</div>

<div class="avatars">
  <div class="avatar-card s">
    <div class="avatar">S</div>
    <div class="avatar-name">Stephen</div>
    <div class="avatar-count" id="sCount">0 times</div>
  </div>
  <div class="avatar-card d">
    <div class="avatar">D</div>
    <div class="avatar-name">Doug</div>
    <div class="avatar-count" id="dCount">0 times</div>
  </div>
</div>

<div class="add-section">
  <div class="section-title">Log an outing</div>
  <div class="form-row">
    <input type="date" id="dateInput" />
    <input type="text" id="noteInput" placeholder="Venue or note…" />
  </div>
  <div class="payer-btns">
    <button class="payer-btn s-btn" id="btnS" onclick="selectPayer('S')">Stephen paid</button>
    <button class="payer-btn d-btn" id="btnD" onclick="selectPayer('D')">Doug paid</button>
  </div>
  <button class="add-btn" id="addBtn" onclick="addOuting()" disabled>Add outing</button>
</div>

<div class="history-section">
  <div class="history-header">
    <div class="section-title" style="margin:0">History</div>
    <button class="clear-btn" onclick="clearAll()">clear all</button>
  </div>
  <div id="historyList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const S_COLOR = '#6C63FF';
  const D_COLOR = '#FF6584';

  let outings = [];
  let selectedPayer = null;

  // Set default date to today
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('dateInput').value = today;

  function load() {
    const raw = localStorage.getItem('shade_outings');
    outings = raw ? JSON.parse(raw) : [];
    render();
  }

  function save() {
    localStorage.setItem('shade_outings', JSON.stringify(outings));
  }

  function selectPayer(p) {
    selectedPayer = p;
    document.getElementById('btnS').classList.toggle('active', p === 'S');
    document.getElementById('btnD').classList.toggle('active', p === 'D');
    checkForm();
  }

  function checkForm() {
    const hasDate = !!document.getElementById('dateInput').value;
    const hasPayer = !!selectedPayer;
    document.getElementById('addBtn').disabled = !(hasDate && hasPayer);
  }

  document.getElementById('dateInput').addEventListener('change', checkForm);
  document.getElementById('noteInput').addEventListener('input', checkForm);

  function addOuting() {
    const date = document.getElementById('dateInput').value;
    const note = document.getElementById('noteInput').value.trim() || 'Unnamed outing';
    if (!date || !selectedPayer) return;

    const outing = { id: Date.now(), date, note, payer: selectedPayer };
    outings.unshift(outing);
    save();
    render();

    // Reset form
    document.getElementById('noteInput').value = '';
    document.getElementById('dateInput').value = today;
    selectPayer(null);
    selectedPayer = null;
    document.getElementById('btnS').classList.remove('active');
    document.getElementById('btnD').classList.remove('active');
    document.getElementById('addBtn').disabled = true;

    showToast('Outing logged ✓');
  }

  function deleteOuting(id) {
    outings = outings.filter(o => o.id !== id);
    save();
    render();
  }

  function clearAll() {
    if (!outings.length) return;
    if (!confirm('Clear all outings? This cannot be undone.')) return;
    outings = [];
    save();
    render();
    showToast('All cleared');
  }

  function formatDate(d) {
    const [y, m, day] = d.split('-');
    return new Date(y, m - 1, day).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function render() {
    // Count totals
    const sTotal = outings.filter(o => o.payer === 'S').length;
    const dTotal = outings.filter(o => o.payer === 'D').length;

    document.getElementById('sCount').textContent = sTotal === 1 ? '1 time' : `${sTotal} times`;
    document.getElementById('dCount').textContent = dTotal === 1 ? '1 time' : `${dTotal} times`;

    // Who pays next
    const nextEl = document.getElementById('nextUp');
    const nextName = document.getElementById('nextName');
    const nextSub = document.getElementById('nextSub');

    if (!outings.length) {
      nextEl.style.setProperty('--next-color', S_COLOR);
      nextName.textContent = '—';
      nextSub.textContent = 'No outings recorded yet';
      nextEl.classList.remove('balanced');
    } else {
      const last = outings[0]; // most recent first
      const nextPayer = last.payer === 'S' ? 'Doug' : 'Stephen';
      const nextColor = last.payer === 'S' ? D_COLOR : S_COLOR;
      nextEl.style.setProperty('--next-color', nextColor);
      nextEl.classList.remove('balanced');

      if (sTotal === dTotal) {
        nextEl.classList.add('balanced');
        nextName.textContent = "You're even!";
        nextSub.textContent = `${sTotal} rounds each — flip a coin 🪙`;
      } else {
        nextName.textContent = nextPayer;
        const lastName = last.payer === 'S' ? 'Stephen' : 'Doug';
        nextSub.textContent = `${lastName} got the last one (${formatDate(last.date)})`;
      }
    }

    // History list
    const listEl = document.getElementById('historyList');
    if (!outings.length) {
      listEl.innerHTML = '<div class="empty-state">Nothing logged yet.<br>Add your first outing above.</div>';
      return;
    }

    listEl.innerHTML = '';
    const ul = document.createElement('div');
    ul.className = 'outing-list';

    outings.forEach(o => {
      const color = o.payer === 'S' ? S_COLOR : D_COLOR;
      const initial = o.payer;
      const payerName = o.payer === 'S' ? 'Stephen' : 'Doug';

      const item = document.createElement('div');
      item.className = 'outing-item';
      item.style.setProperty('--item-color', color);
      item.innerHTML = `
        <div class="outing-avatar">${initial}</div>
        <div class="outing-info">
          <div class="outing-note">${escHtml(o.note)}</div>
          <div class="outing-meta">${formatDate(o.date)}</div>
        </div>
        <div class="outing-payer">${payerName} paid</div>
        <button class="delete-btn" onclick="deleteOuting(${o.id})" title="Remove">✕</button>
      `;
      ul.appendChild(item);
    });

    listEl.appendChild(ul);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  load();
</script>
</body>
</html>
